<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Volcano body -->
  <polygon points="1,31 16,8 31,31" fill="#5c4a38"/>
  <!-- Darker right flank for depth -->
  <polygon points="16,8 31,31 23,31" fill="#3d3128"/>
  <!-- Inner crater valley -->
  <polygon points="12,31 16,20 20,31" fill="#2d2018"/>
  <!-- Eruption glow -->
  <circle cx="16" cy="9" r="5" fill="#ff4500" opacity="0.45"/>
  <!-- Active crater: concentric rings -->
  <ellipse cx="16" cy="9" rx="3.5" ry="2" fill="#cc2200"/>
  <ellipse cx="16" cy="8.5" rx="2.2" ry="1.3" fill="#ff4500"/>
  <ellipse cx="16" cy="8" rx="1.2" ry="0.7" fill="#ff9f1c"/>
  <!-- Eruption blobs -->
  <circle cx="12.5" cy="5" r="1.8" fill="#ff4500"/>
  <circle cx="19.5" cy="4" r="1.4" fill="#ff6b00"/>
  <circle cx="15.5" cy="2.5" r="1.5" fill="#ff9f1c"/>
  <circle cx="21" cy="6.5" r="1" fill="#cc2200"/>
  <circle cx="11" cy="3.5" r="0.9" fill="#ff4500"/>
</svg>
